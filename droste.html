<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droste Effect Generator</title>
    <link rel="stylesheet" href="droste.css">
</head>
<body>
    <a href="index.html" style="position: fixed; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.6); color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-family: sans-serif; font-weight: bold; font-size: 14px; z-index: 9999; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);" onmouseover="this.style.background='rgba(0,0,0,0.8)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">&larr; Back to Portfolio</a>
    <div class="container">
        <header>
            <h1>Droste Effect Generator</h1>
        </header>
        <main>
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>
            <div class="controls">
                <div class="control-group">
                    <label for="upload" class="button">Upload Image</label>
                    <input type="file" id="upload" accept="image/*">
                </div>
                <div class="control-group">
                    <label for="zoom">Zoom Factor: <span id="view-zoom">1.00</span></label>
                    <input type="range" id="zoom" min="-3" max="3" step="0.01" value="1">
                </div>
                <div class="control-group">
                    <label for="twist">Twist: <span id="view-twist">0.00</span></label>
                    <input type="range" id="twist" min="-5" max="5" step="0.01" value="0">
                </div>
                <div class="control-group">
                    <button id="download" class="button">Download Image</button>
                </div>
            </div>
        </main>
    </div>
    <script src="droste.js"></script>
</body>
</html>
